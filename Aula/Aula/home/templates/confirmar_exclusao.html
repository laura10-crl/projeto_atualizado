<!DOCTYPE html>
<html>
<head>

<title>Confirmar Exclusão</title>

</head>

<h2>Confirmar Exclusão</h2>

<p>Deseja excluir o livro {{ livro.titulo }} ?</p>

<form method="POST" class="detail-block">
    {% csrf_token %}
    <button type="submit" class="btn botao-excluir">Sim, excluir</button>
</form>

<a href="/listar/" class="btn botao-cancelar" style="width: auto; margin: 0.75rem auto 0.25rem;">Cancelar</a>

</body>
</html>
